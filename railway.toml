[build]
builder = "nixpacks"
# Install deps, then the screenshot browser. The browser install is made
# non-fatal (|| true): if Railway blocks the system-package part, the build
# still succeeds and screenshots simply degrade gracefully at runtime (the
# Client Profile falls back to plain text scraping). We can perfect Playwright
# on Railway after the app is live.
buildCommand = "pip install -r requirements.txt && (python -m playwright install --with-deps chromium || python -m playwright install chromium || true)"

[deploy]
# Runs before each deploy goes live: build/upgrade the DB schema from the
# migration files, then create the first admin (idempotent). FLASK_APP is set
# inline so the flask CLI targets the right app regardless of env.
preDeployCommand = "FLASK_APP=main_app:app flask db upgrade && FLASK_APP=main_app:app flask bootstrap-admin"
startCommand = "gunicorn main_app:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
